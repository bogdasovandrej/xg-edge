name: Live predictions

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: xgedge-data-writers
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .[dev]
      - name: Fetch official fixtures
        run: >-
          python scripts/fetch_current_fixtures.py
          --output-dir reports/live
          --uefa-competition ucl
          || echo "Official fixture refresh unavailable; retaining checked-in snapshot"
      - name: Predict World Cup
        shell: bash
        run: |
          python scripts/predict_world_cup.py \
            --draws 2000 --seed 20260713 \
            --output-json reports/world_cup_2026_semifinals.json \
            --output-csv reports/world_cup_2026_semifinals.csv \
          || python scripts/predict_world_cup.py \
            --fixtures-json reports/world_cup_2026_fifa_fixtures_asof_2026-07-13.json \
            --rankings-json reports/world_cup_2026_fifa_rankings_pre_tournament.json \
            --draws 2000 --seed 20260713 \
            --output-json reports/world_cup_2026_semifinals.json \
            --output-csv reports/world_cup_2026_semifinals.csv
      - name: Predict Champions League qualifiers
        run: >-
          python scripts/predict_ucl_qualifying.py
          --mode live --limit 14 --simulations 100000 --seed 20260713
          --output-json reports/ucl_qualifying_predictions.json
          --output-csv reports/ucl_qualifying_predictions.csv
      - name: Fetch official UEFA club history
        run: >-
          python scripts/fetch_uefa_history.py
          --fixtures reports/live/current_fixtures.json
          --output reports/live/uefa_club_history.json
          || echo "UEFA history refresh unavailable; retaining checked-in snapshot"
      - name: Fetch point-in-time weather
        run: >-
          python scripts/fetch_weather_context.py
          --fixtures reports/live/current_fixtures.json
          --output reports/live/match_context.json
          || echo "Weather refresh unavailable; retaining checked-in snapshot"
      - name: Fetch top-five fixtures
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: >-
          python scripts/fetch_top5_fixtures.py
          --output reports/live/top5_fixtures.json
      - name: Build public payload
        run: >-
          python scripts/build_live_payload.py
          --world-cup reports/world_cup_2026_semifinals.json
          --ucl reports/ucl_qualifying_predictions.json
          --fixtures reports/live/current_fixtures.json
          --markets reports/live/world_cup_opening_markets.json
          --anchor-audit reports/market_anchor_audit.json
          --world-cup-history reports/world_cup_2026_fifa_fixtures_asof_2026-07-13.json
          --rankings reports/world_cup_2026_fifa_rankings_pre_tournament.json
          --contexts reports/live/match_context.json
          --prospective-ledger reports/live/prospective_clv.json
          --odds-snapshot reports/live/bookmaker_odds.json
          --paper-ledger reports/live/paper_trading.json
          --uefa-history reports/live/uefa_club_history.json
          --top-five-fixtures reports/live/top5_fixtures.json
          --output reports/live_predictions.json
      - name: Freeze forecast evidence
        run: >-
          python scripts/update_forecast_archive.py
          --archive reports/live/forecast_archive.json
          --fixtures reports/live/current_fixtures.json
          --live-payload reports/live_predictions.json
      - name: Settle completed prospective forecasts
        run: >-
          python scripts/settle_prospective_results.py
          --ledger reports/live/prospective_clv.json
          --live-payload reports/live_predictions.json
          || echo "Official result settlement unavailable; retaining the valid ledger"
      - name: Update PAPER model registry
        run: >-
          python scripts/update_model_registry.py
          --archive reports/live/forecast_archive.json
          --registry reports/live/model_registry.json
      - name: Update PAPER strategy ledger
        run: >-
          python scripts/update_paper_trading.py
          --ledger reports/live/paper_trading.json
          --live-payload reports/live_predictions.json
          --prospective-ledger reports/live/prospective_clv.json
      - name: Validate live pipeline
        run: python -m pytest -q tests/test_official_feeds.py tests/test_official_results.py tests/test_world_cup_model.py tests/test_ucl_qualifying.py tests/test_live_payload.py tests/test_live_market.py tests/test_match_dossier.py tests/test_weather.py tests/test_bookmaker_odds.py tests/test_prospective.py tests/test_paper_simulation.py tests/test_paper_ledger.py tests/test_update_paper_trading.py tests/test_forecast_archive_cli.py
      - name: Publish changed snapshot
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/live reports/live_predictions.json \
            reports/world_cup_2026_semifinals.json reports/world_cup_2026_semifinals.csv \
            reports/ucl_qualifying_predictions.json reports/ucl_qualifying_predictions.csv
          if git diff --cached --quiet; then
            echo "No live-data changes"
          else
            git commit -m "data: refresh live predictions"
            git push
          fi
