name: Live predictions

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-predictions
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .[dev]
      - name: Fetch official fixtures
        run: >-
          python scripts/fetch_current_fixtures.py --output-dir reports/live
          || echo "Official fixture refresh unavailable; retaining checked-in snapshot"
      - name: Predict World Cup
        shell: bash
        run: |
          python scripts/predict_world_cup.py \
            --draws 2000 --seed 20260713 \
            --output-json reports/world_cup_2026_semifinals.json \
            --output-csv reports/world_cup_2026_semifinals.csv \
          || python scripts/predict_world_cup.py \
            --fixtures-json reports/world_cup_2026_fifa_fixtures_asof_2026-07-13.json \
            --rankings-json reports/world_cup_2026_fifa_rankings_pre_tournament.json \
            --draws 2000 --seed 20260713 \
            --output-json reports/world_cup_2026_semifinals.json \
            --output-csv reports/world_cup_2026_semifinals.csv
      - name: Predict Champions League qualifiers
        run: >-
          python scripts/predict_ucl_qualifying.py
          --mode live --limit 14 --simulations 100000 --seed 20260713
          --output-json reports/ucl_qualifying_predictions.json
          --output-csv reports/ucl_qualifying_predictions.csv
      - name: Fetch point-in-time weather
        run: >-
          python scripts/fetch_weather_context.py
          --fixtures reports/live/current_fixtures.json
          --output reports/live/match_context.json
          || echo "Weather refresh unavailable; retaining checked-in snapshot"
      - name: Build public payload
        run: >-
          python scripts/build_live_payload.py
          --world-cup reports/world_cup_2026_semifinals.json
          --ucl reports/ucl_qualifying_predictions.json
          --fixtures reports/live/current_fixtures.json
          --markets reports/live/world_cup_opening_markets.json
          --anchor-audit reports/market_anchor_audit.json
          --world-cup-history reports/world_cup_2026_fifa_fixtures_asof_2026-07-13.json
          --rankings reports/world_cup_2026_fifa_rankings_pre_tournament.json
          --contexts reports/live/match_context.json
          --output reports/live_predictions.json
      - name: Validate live pipeline
        run: python -m pytest -q tests/test_official_feeds.py tests/test_world_cup_model.py tests/test_ucl_qualifying.py tests/test_live_payload.py tests/test_live_market.py tests/test_match_dossier.py tests/test_weather.py
      - name: Publish changed snapshot
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/live reports/live_predictions.json \
            reports/world_cup_2026_semifinals.json reports/world_cup_2026_semifinals.csv \
            reports/ucl_qualifying_predictions.json reports/ucl_qualifying_predictions.csv
          if git diff --cached --quiet; then
            echo "No live-data changes"
          else
            git commit -m "data: refresh live predictions"
            git push
          fi
