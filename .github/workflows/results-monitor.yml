name: Official result monitor

on:
  schedule:
    - cron: "11,41 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: xgedge-data-writers
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .[dev]
      - name: Finalize closing line and settle finished matches
        run: >-
          python scripts/settle_prospective_results.py
          --ledger reports/live/prospective_clv.json
          --live-payload reports/live_predictions.json
      - name: Update immutable forecast archive
        run: >-
          python scripts/update_forecast_archive.py
          --archive reports/live/forecast_archive.json
          --fixtures reports/live/current_fixtures.json
          --live-payload reports/live_predictions.json
          --fetch-results
      - name: Update PAPER model registry
        run: >-
          python scripts/update_model_registry.py
          --archive reports/live/forecast_archive.json
          --registry reports/live/model_registry.json
      - name: Settle PAPER strategies
        run: >-
          python scripts/update_paper_trading.py
          --ledger reports/live/paper_trading.json
          --live-payload reports/live_predictions.json
          --prospective-ledger reports/live/prospective_clv.json
      - name: Validate result contract
        run: python -m pytest -q tests/test_official_results.py tests/test_prospective.py tests/test_paper_ledger.py tests/test_update_paper_trading.py tests/test_forecast_archive_cli.py
      - name: Publish changed settlement
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/live/prospective_clv.json reports/live/paper_trading.json reports/live/forecast_archive.json reports/live/model_registry.json reports/live_predictions.json
          if git diff --cached --quiet; then
            echo "No completed prospective fixtures"
          else
            git commit -m "data: settle prospective match results"
            git push
          fi
